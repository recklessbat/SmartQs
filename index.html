<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartQs — Conference Question Generator</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="logo">SmartQs</h1>
      <p class="subtitle">AI-Enabled Future of HR &amp; Employee Experience</p>
    </header>

    <main class="main">
      <section class="input-section">
        <input
          type="text"
          id="categoryInput"
          class="category-input"
          placeholder="Enter a question category..."
          autocomplete="off"
          spellcheck="false"
        >
      </section>

      <section class="sliders-section">
        <div class="slider-group">
          <div class="slider-header">
            <label for="complexitySlider">Question Complexity</label>
            <span class="slider-value" id="complexityValue">3</span>
          </div>
          <div class="slider-labels">
            <span>Simple</span>
            <span>Expert</span>
          </div>
          <input type="range" id="complexitySlider" min="1" max="5" value="3" step="1">
        </div>

        <div class="slider-group">
          <div class="slider-header">
            <label for="strategySlider">Strategic Focus</label>
            <span class="slider-value" id="strategyValue">3</span>
          </div>
          <div class="slider-labels">
            <span>Tactical</span>
            <span>Visionary</span>
          </div>
          <input type="range" id="strategySlider" min="1" max="5" value="3" step="1">
        </div>

        <div class="slider-group">
          <div class="slider-header">
            <label for="genzSlider">Gen Z Coded</label>
            <span class="slider-value" id="genzValue">1</span>
          </div>
          <div class="slider-labels">
            <span>Corporate</span>
            <span>No Cap</span>
          </div>
          <input type="range" id="genzSlider" min="1" max="5" value="1" step="1">
        </div>
      </section>

      <button id="generateBtn" class="generate-btn" disabled>Generate Question</button>

      <section class="output-section" id="outputSection">
        <div class="question-card" id="questionCard">
          <p class="generated-question" id="generatedQuestion"></p>
          <button class="copy-btn" id="copyBtn" title="Copy to clipboard">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
          </button>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>Tap generate to craft your perfect conference question</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
